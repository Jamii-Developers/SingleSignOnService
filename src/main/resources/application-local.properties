# Application name

spring.application.name=JamiiX

# Boot time optimizations
spring.main.lazy-initialization=true

# Database properties

spring.datasource.url=jdbc:postgresql://localhost:5432/jamiidb
spring.datasource.username=jamiix
spring.datasource.password=jamiixsystem
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate - optimized for startup

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Cache Configuration
spring.cache.type=simple
spring.cache.cache-names=user-profiles,user-sessions,file-metadata

# Connection pooling settings - optimized for startup

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=-1

# File upload sizes

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Spring Session settings

spring.session.jdbc.initialize-schema=always
server.servlet.session.timeout=5m

# Server port

server.port=${PORT:8080}

# Logging - optimized for startup

logging.level.org.springframework.jdbc.datasource.DriverManagerDataSource=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.org.springframework.boot.autoconfigure.orm.jpa.HibernateProperties=WARN
logging.level.com.jamii=INFO
logging.level.org.springframework.boot=WARN
logging.level.org.springframework=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/jamiix.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# Flyway Migrations - optimized for startup (runs before JPA)

spring.flyway.enabled=true
logging.level.org.flywaydb=WARN
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.clean-disabled=true
spring.flyway.locations=classpath:migration
spring.flyway.out-of-order=false
spring.flyway.check-location=false
spring.jpa.defer-datasource-initialization=false


# Actuator configuration - startup monitoring
management.endpoints.web.exposure.include=health,info,metrics,startup
management.endpoint.startup.enabled=true
management.info.env.enabled=true

# Cors configuration

app.cors.allowed-origins=http://localhost:3000

