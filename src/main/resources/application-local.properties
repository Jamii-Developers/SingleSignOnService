# Application name

spring.application.name=JamiiX

# Database properties

spring.datasource.url=jdbc:postgresql://localhost:5432/jamiidb
spring.datasource.username=jamiix
spring.datasource.password=jamiixsystem
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Connection pooling settings

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# File upload sizes

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Spring Session settings

spring.session.jdbc.initialize-schema=always
server.servlet.session.timeout=5m

# Server port

server.port=8080

# Logging

logging.level.org.springframework.jdbc.datasource.DriverManagerDataSource=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=DEBUG
logging.level.org.springframework.boot.autoconfigure.orm.jpa.HibernateProperties=DEBUG

# Flyway Migrations

spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration/local

# Cors configuration

app.cors.allowed-origins=http://localhost:3000,
