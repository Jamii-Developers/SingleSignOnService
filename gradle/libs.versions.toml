# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/platforms.html#sub::toml-dependencies-format

[versions]
gson = "2.13.1"
postgresql = "42.7.7"
commons-net = "3.12.0"
flyway = "11.12.0"
json = "20250517"
springdoc = "2.8.9"

[libraries]

spring-boot-starter-web = { module = "org.springframework.boot:spring-boot-starter-web" }
spring-boot-starter-data-jpa = { module = "org.springframework.boot:spring-boot-starter-data-jpa" }
spring-boot-starter-security = { module = "org.springframework.boot:spring-boot-starter-security" }
spring-boot-starter-test = { module = "org.springframework.boot:spring-boot-starter-test" }
spring-boot-starter-flyway = { module = "org.springframework.boot:spring-boot-starter-flyway"}

spring-session-jdbc = { module = "org.springframework.session:spring-session-jdbc" }

json = { module = "org.json:json", version.ref = "json" }
gson = { module = "com.google.code.gson:gson", version.ref = "gson" }
commons-net = { module = "commons-net:commons-net", version.ref = "commons-net" }

postgresql = { module = "org.postgresql:postgresql", version.ref = "postgresql" }

flyway-postgresql = { module = "org.flywaydb:flyway-database-postgresql", version.ref = "flyway" }

springdoc-openapi = { module = "org.springdoc:springdoc-openapi-starter-webmvc-ui", version.ref = "springdoc" }